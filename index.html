    }

      align-items: center;

      top: 0;

    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 13px;
      color: #6e6e73;
    }

    #status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #f0f0f0;
      color: #6e6e73;
    }

    #status.live { background: #e3f9e5; color: #1a7a30; }

      max-width: 960px;
      margin: 40px auto;
      padding: 0 24px 60px;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #d1d1d6;
      background: #fff;
      cursor: pointer;
      color: #3a3a3c;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #aaa; }
    .filter-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }
    .filter-btn.high.active   { background: #c0392b; border-color: #c0392b; }

    .filter-btn.low.active    { background: #1a7a30; border-color: #1a7a30; }

      border: 1px solid #e5e5e5;
      margin-bottom: 16px;
      overflow: hidden;
      transition: box-shadow 0.15s;

      align-items: center;
      padding: 18px 24px;

      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;

      font-size: 12px;
      color: #6e6e73;
      margin-top: 2px;

      font-weight: 500;

      background: #e8f0fe;

      color: #1d1d1f;

      margin: 32px 0;
    }

      padding-left: 20px;
      margin: 4px 0 10px;
    }

    .policy-content li {
      margin-bottom: 3px;

    .policy-content li > ul {
      margin-top: 3px;
      padding-left: 16px;
    }

    .policy-content p.policy-para {
      margin-bottom: 6px;
    }

    .policy-content strong { color: #1d1d1f; }

    .policy-content code {
      font-family: "SF Mono", Menlo, monospace;
      font-size: 12px;
      background: #f0f0f0;
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* Tables */
    .policy-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 8px 0 16px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
    }

    .policy-table thead tr {
      background: #f5f5f7;
    }

    .policy-table th {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #6e6e73;
      padding: 9px 14px;
      text-align: left;
      border-bottom: 1px solid #e5e5e5;
    }

    .policy-table td {
      padding: 9px 14px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
      line-height: 1.6;
    }

    .policy-table tbody tr:last-child td {
      border-bottom: none;
    }

    .policy-table tbody tr:hover td {
      background: #fafafa;
    }

    /* ── Policy metadata block ── */

    .policy-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      overflow: hidden;
      margin: 18px 0 20px;

    .meta-label {
      background: #f5f5f7;
      padding: 8px 14px;
      color: #6e6e73;
      font-weight: 500;
      border-bottom: 1px solid #e5e5e5;

    .meta-value {
      background: #fff;
      padding: 8px 14px;
      color: #1d1d1f;
      border-bottom: 1px solid #e5e5e5;

      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;

    doc: "Spend Policy v2 / Information Security Policy v2",
    severity: "medium",
    url: docxViewer(`${BASE_STORAGE}/AcceptableUsePolicy_v2.docx`),
    default: `Filed Vendor & Third-Party Policy

## Before onboarding any new vendor or tool
1. Does it process personal or customer data? If yes, a signed DPA is required before access
2. Where is data stored? Must be US-based servers — no offshore data transfers permitted
3. Do they have SOC 2 Type II or equivalent certification?
4. Will they need access to Filed systems? If yes, requires security review and approval
5. NDA must be signed before sharing any confidential information

## Ongoing vendor management
- Disclosures of Confidential/Restricted data to third parties must be documented and tracked
- Client data must never be used by vendors to train AI models
- Any vendor accessing taxpayer data must comply with IRS Section 7216

## Approval requirements

| Contract value | Approver |
| --- | --- |
| < $10,000/year | Department head |
| $10,000–$50,000/year | VP or C-level |
| > $50,000/year | CEO (Kamyar) |`,
  },
];

let currentFilter = "all";
let overrides = {};
let manualEdits = {};
let metadata = {};
let auditLog = {};

function sbFetch(path) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
  });
}

async function fetchOverrides() {
  try {
    const [resOverrides, resMeta, resAudit] = await Promise.all([
      sbFetch("policy_overrides?select=category,text,updated_by"),
      sbFetch("policy_metadata?select=*"),
      sbFetch("policy_audit_log?select=*&order=changed_at.asc"),
    ]);

    if (!resOverrides.ok) throw new Error(resOverrides.statusText);

    const [dataOverrides, dataMeta, dataAudit] = await Promise.all([
      resOverrides.json(),
      resMeta.ok ? resMeta.json() : [],
      resAudit.ok ? resAudit.json() : [],
    ]);

    overrides = {};
    manualEdits = {};
    for (const row of dataOverrides) {
      overrides[row.category] = row.text;
      if (row.updated_by && row.updated_by !== "system") manualEdits[row.category] = true;
    }

    metadata = {};
    for (const row of dataMeta) metadata[row.category] = row;

    auditLog = {};
    for (const row of dataAudit) {
      if (!auditLog[row.category]) auditLog[row.category] = [];
      auditLog[row.category].push(row);
    }

    document.getElementById("status").textContent = "Live";
    document.getElementById("status").className = "live";
    const now = new Date();
    document.getElementById("last-updated").textContent =
      `Updated ${now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
  } catch (e) {
    console.error("[policies] fetch failed:", e);
    document.getElementById("status").textContent = "Offline — showing defaults";
    document.getElementById("status").className = "error";
  }
}

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function inlineFormat(str) {
  return escapeHtml(str)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/_(.+?)_/g, "<em>$1</em>")
    .replace(/`(.+?)`/g, "<code>$1</code>");
}

function textToHtml(raw) {
  const lines = raw.split("\n");
  const out = [];
  let i = 0;

  function closeList(tag) {
    out.push(`</${tag}>`);
  }

  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();

    // Blank line — skip
    if (!trimmed) { i++; continue; }

    // Document separator: ---
    if (trimmed === "---") {
      out.push('<hr class="policy-divider">');
      i++;
      continue;
    }

    // Top-level header: # ...
    if (trimmed.startsWith("# ")) {
      out.push(`<h2 class="policy-title">${escapeHtml(trimmed.slice(2))}</h2>`);
      i++;
      continue;
    }

    // Section header: ## ...
    if (trimmed.startsWith("## ")) {
      out.push(`<h3 class="policy-section">${escapeHtml(trimmed.slice(3))}</h3>`);
      i++;
      continue;
    }

    // Subsection header: ### ...
    if (trimmed.startsWith("### ")) {
      out.push(`<h4 class="policy-subsection">${escapeHtml(trimmed.slice(4))}</h4>`);
      i++;
      continue;
    }

    // Deep subsection: #### ...
    if (trimmed.startsWith("#### ")) {
      out.push(`<h5 class="policy-subsubsection">${escapeHtml(trimmed.slice(5))}</h5>`);
      i++;
      continue;
    }

    // Table block: starts with |
    if (trimmed.startsWith("|")) {
      const tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith("|")) {
        tableLines.push(lines[i].trim());
        i++;
      }
      // Filter out separator rows (e.g. | --- | --- |)
      const dataRows = tableLines.filter(l => !/^\|[\s\-|:]+\|$/.test(l));
      if (dataRows.length > 0) {
        const parseCells = row =>
          row.split("|").slice(1, -1).map(c => c.trim());
        const headers = parseCells(dataRows[0]);
        const body = dataRows.slice(1);
        let t = '<table class="policy-table"><thead><tr>';
        headers.forEach(h => t += `<th>${inlineFormat(h)}</th>`);
        t += "</tr></thead><tbody>";
        body.forEach(row => {
          t += "<tr>";
          parseCells(row).forEach(c => t += `<td>${inlineFormat(c)}</td>`);
          t += "</tr>";
        });
        t += "</tbody></table>";
        out.push(t);
      }
      continue;
    }

    // Unordered list block
    if (trimmed.startsWith("- ")) {
      out.push('<ul class="policy-list">');
      while (i < lines.length) {
        const t = lines[i].trim();
        if (!t.startsWith("- ")) break;
        const itemText = inlineFormat(t.slice(2));
        // Collect indented sub-items on following lines
        const subs = [];
        i++;
        while (i < lines.length) {
          const sub = lines[i].trim();
          const isIndented = lines[i].startsWith("  ") || lines[i].startsWith("\t");
          if (isIndented && sub.startsWith("- ")) {
            subs.push(inlineFormat(sub.slice(2)));
            i++;
          } else {
            break;
          }
        }
        if (subs.length > 0) {
          out.push(`<li>${itemText}<ul>${subs.map(s => `<li>${s}</li>`).join("")}</ul></li>`);
        } else {
          out.push(`<li>${itemText}</li>`);
        }
      }
      out.push("</ul>");
      continue;
    }

    // Ordered list block
    if (/^\d+\./.test(trimmed)) {
      out.push('<ol class="policy-list">');
      while (i < lines.length && /^\d+\./.test(lines[i].trim())) {
        const item = lines[i].trim().replace(/^\d+\.\s*/, "");
        out.push(`<li>${inlineFormat(item)}</li>`);
        i++;
      }
      out.push("</ol>");
      continue;
    }

    // First non-header line (policy title/intro)
    if (out.length === 0) {
      out.push(`<p class="policy-intro">${inlineFormat(trimmed)}</p>`);
    } else {
      out.push(`<p class="policy-para">${inlineFormat(trimmed)}</p>`);
    }
    i++;
  }

  return out.join("");
}

function renderCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  const filtered = POLICIES.filter(p =>
    currentFilter === "all" || p.severity === currentFilter
  );

  document.getElementById("empty").style.display = filtered.length === 0 ? "block" : "none";

  filtered.forEach(p => {
    const text = overrides[p.category] || p.default;
    const isOverride = !!manualEdits[p.category];

    const card = document.createElement("div");
    card.className = "policy-card";
    card.id = `policy-${p.category}`;
    card.dataset.severity = p.severity;

    const meta = metadata[p.category];
    const logs = auditLog[p.category] || [];

    const metaHtml = meta ? `
      <div class="policy-meta">
        <div class="meta-row">
          <span class="meta-label">Version</span>
          <span class="meta-value">${escapeHtml(meta.version || "—")}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Document Owner</span>
          <span class="meta-value">${escapeHtml(meta.document_owner || "—")}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Approved By</span>
          <span class="meta-value">${escapeHtml(meta.approved_by || "—")}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Effective Date</span>
          <span class="meta-value">${meta.effective_date ? new Date(meta.effective_date).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }) : "—"}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Renewal Date</span>
          <span class="meta-value">${meta.renewal_date ? new Date(meta.renewal_date).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }) : "—"}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Compliance Impact</span>
          <span class="meta-value">${escapeHtml(meta.compliance_impact || "—")}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Classification</span>
          <span class="meta-value">${escapeHtml(meta.classification || "—")}</span>
        </div>
      </div>` : "";

    const auditHtml = logs.length > 0 ? `
      <div class="audit-section">
        <div class="audit-title">Revision History</div>
        <table class="policy-table">
          <thead><tr>
            <th>Version</th><th>Date</th><th>Editor</th><th>Approver</th><th>Description</th>
          </tr></thead>
          <tbody>
            ${logs.map(l => `<tr>
              <td>${escapeHtml(l.version || "—")}</td>
              <td>${l.changed_at ? new Date(l.changed_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "—"}</td>
              <td>${escapeHtml(l.changed_by || "—")}</td>
              <td>${escapeHtml(l.approved_by || "—")}</td>
              <td>${escapeHtml(l.description || "—")}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>` : "";

    card.innerHTML = `
      <div class="card-header">
        <div class="severity-dot ${p.severity}"></div>
        <div class="card-title">
          <h2>${escapeHtml(p.name)}</h2>
          <p>${escapeHtml(p.doc)}${meta ? ` · v${escapeHtml(meta.version)}` : ""}</p>
        </div>
        <div class="card-badges">
          <span class="badge severity-${p.severity}">${p.severity}</span>
          ${isOverride ? '<span class="badge override">Override active</span>' : ""}
        </div>
        <svg class="chevron" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
        </svg>
      </div>
      <div class="card-body">
        ${metaHtml}
        ${isOverride ? '<div class="override-notice">✦ This policy has been customised via /norm edit</div>' : ""}
        <div class="policy-content">${textToHtml(text)}</div>
        ${auditHtml}
      </div>
    `;

    card.querySelector(".card-header").addEventListener("click", () => {
      card.classList.toggle("open");
    });

    container.appendChild(card);
  });
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    renderCards();
  });
});

function openCardFromParam() {
  const policy = new URLSearchParams(window.location.search).get("policy");
  if (!policy) return;
  const target = document.getElementById(`policy-${policy}`);
  if (!target) return;
  target.classList.add("open");
  setTimeout(() => target.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
}

(async () => {
  renderCards(); // show defaults immediately
  await fetchOverrides();
  renderCards(); // re-render with any live overrides
  openCardFromParam();
})();
</script>
</body>
</html>
